<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>People Counter</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: rgba(255,255,255,0.08);
    --accent: #7c6ff7;
    --accent-glow: rgba(124,111,247,0.25);
    --green: #34d399;
    --green-dim: rgba(52,211,153,0.15);
    --text: #f0f0f5;
    --muted: #8888a0;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; overflow: hidden; }

  #app { display: flex; flex-direction: column; height: 100dvh; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px 10px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0; z-index: 10;
  }
  .brand { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
  .brand span { color: var(--accent); }

  .pill {
    font-size: 11px; font-weight: 500; padding: 3px 10px;
    border-radius: 20px; border: 1px solid var(--border);
    color: var(--muted); letter-spacing: 0.3px; text-transform: uppercase;
  }
  .pill.running { border-color: var(--green); color: var(--green); background: var(--green-dim); }
  .pill.loading-pill { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }
  .pill.error-pill { border-color: #e24b4a; color: #f09595; background: #3a1010; }

  #viewport { position: relative; flex: 1; background: #000; overflow: hidden; }

  #video { width: 100%; height: 100%; object-fit: cover; display: block; }
  #canvas { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }

  /* ── Overlay screens ── */
  .screen {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: var(--bg); gap: 20px; z-index: 5; padding: 32px;
  }

  .icon-ring {
    width: 88px; height: 88px; border-radius: 50%;
    background: var(--accent-glow); border: 1px solid var(--accent);
    display: flex; align-items: center; justify-content: center;
  }
  .icon-ring svg { width: 40px; height: 40px; stroke: var(--accent); stroke-width: 1.5; fill: none; }

  .screen h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; text-align: center; line-height: 1.2; }
  .screen h1 em { font-style: normal; color: var(--accent); }
  .screen p { font-size: 14px; color: var(--muted); text-align: center; max-width: 280px; line-height: 1.6; }

  #btn-start {
    margin-top: 8px; padding: 15px 40px; border-radius: 50px;
    border: none; background: var(--accent); color: #fff;
    font-size: 16px; font-weight: 600; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.1s, opacity 0.1s;
  }
  #btn-start:active { transform: scale(0.97); opacity: 0.9; }

  .note { font-size: 11px; color: var(--muted); text-align: center; max-width: 260px; line-height: 1.5; }

  /* Loading */
  .spinner {
    width: 48px; height: 48px; border-radius: 50%;
    border: 3px solid var(--border); border-top-color: var(--accent);
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #loading-msg { font-size: 15px; font-weight: 500; color: var(--text); text-align: center; }
  #loading-sub { font-size: 12px; color: var(--muted); text-align: center; max-width: 260px; line-height: 1.5; }

  #progress-wrap { width: 220px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  #progress-bar { height: 100%; width: 0%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }

  /* Stats */
  #stats-bar {
    display: none; flex-shrink: 0;
    background: var(--surface); border-top: 1px solid var(--border);
    padding: 12px 18px; z-index: 10;
  }
  .stats-row { display: flex; gap: 12px; }
  .stat-card {
    flex: 1; background: var(--bg); border: 1px solid var(--border);
    border-radius: 14px; padding: 10px 14px;
    display: flex; flex-direction: column; gap: 2px;
  }
  .stat-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); }
  .stat-value { font-size: 28px; font-weight: 700; letter-spacing: -1px; line-height: 1; color: var(--text); }
  .stat-card.peak .stat-value { color: var(--accent); }
  .stat-card.current .stat-value { color: var(--green); }

  #btn-reset {
    margin-top: 10px; width: 100%; padding: 11px; border-radius: 12px;
    border: 1px solid var(--border); background: transparent; color: var(--muted);
    font-size: 13px; font-weight: 500; cursor: pointer;
    -webkit-tap-highlight-color: transparent; transition: background 0.15s, color 0.15s;
  }
  #btn-reset:active { background: var(--border); color: var(--text); }

  /* Error toast */
  #error-toast {
    display: none; position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #3a1010; border: 1px solid #e24b4a; color: #f09595;
    font-size: 12px; padding: 10px 16px; border-radius: 10px;
    text-align: center; max-width: 300px; z-index: 20; line-height: 1.4;
  }
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="brand">People<span>Counter</span></div>
    <div class="pill" id="status-pill">Ready</div>
  </header>

  <div id="viewport">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <!-- Start screen -->
    <div class="screen" id="start-screen">
      <div class="icon-ring">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 1 0-16 0"/></svg>
      </div>
      <h1>Real-time<br><em>People Counter</em></h1>
      <p>Uses YOLOv8 AI to detect people through your camera. Everything runs on your device — nothing is uploaded.</p>
      <button id="btn-start">Open Camera</button>
      <p class="note">Camera permission required. AI model (~25 MB) downloads once and is cached by your browser.</p>
    </div>

    <!-- Loading screen -->
    <div class="screen" id="loading-screen" style="display:none;">
      <div class="spinner"></div>
      <div id="loading-msg">Starting camera...</div>
      <div id="progress-wrap" style="display:none;"><div id="progress-bar"></div></div>
      <div id="loading-sub"></div>
    </div>

    <div id="error-toast"></div>
  </div>

  <div id="stats-bar">
    <div class="stats-row">
      <div class="stat-card current">
        <div class="stat-label">Now in frame</div>
        <div class="stat-value" id="count-now">0</div>
      </div>
      <div class="stat-card peak">
        <div class="stat-label">Peak (session)</div>
        <div class="stat-value" id="count-peak">0</div>
      </div>
    </div>
    <button id="btn-reset">Reset peak counter</button>
  </div>

</div>

<!-- Transformers.js — handles model download, WASM, and YOLO inference -->
<script type="module">
import { pipeline, env, RawImage } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.1.2/dist/transformers.min.js';

// Use CDN-hosted WASM files
env.allowLocalModels = false;
env.backends.onnx.wasm.proxy = false;

// ── Elements ──
const video         = document.getElementById('video');
const canvas        = document.getElementById('canvas');
const ctx           = canvas.getContext('2d');
const startScreen   = document.getElementById('start-screen');
const loadingScreen = document.getElementById('loading-screen');
const loadingMsg    = document.getElementById('loading-msg');
const loadingSub    = document.getElementById('loading-sub');
const progressWrap  = document.getElementById('progress-wrap');
const progressBar   = document.getElementById('progress-bar');
const statsBar      = document.getElementById('stats-bar');
const statusPill    = document.getElementById('status-pill');
const countNow      = document.getElementById('count-now');
const countPeak     = document.getElementById('count-peak');
const errorToast    = document.getElementById('error-toast');
const btnStart      = document.getElementById('btn-start');
const btnReset      = document.getElementById('btn-reset');

// ── State ──
let detector = null;
let peakCount = 0;
let isRunning = false;
let animId = null;

// ── Helpers ──
function showError(msg) {
  errorToast.textContent = msg;
  errorToast.style.display = 'block';
  setTimeout(() => errorToast.style.display = 'none', 7000);
}
function setPill(text, cls) {
  statusPill.textContent = text;
  statusPill.className = 'pill ' + (cls || '');
}
function setLoading(msg, sub) {
  loadingMsg.textContent = msg;
  loadingSub.textContent = sub || '';
}

// ── Start ──
btnStart.addEventListener('click', async () => {
  startScreen.style.display = 'none';
  loadingScreen.style.display = 'flex';
  setLoading('Starting camera...', 'Please allow camera access when prompted');

  // 1. Camera
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 } },
      audio: false
    });
    video.srcObject = stream;
    await new Promise(r => video.addEventListener('loadedmetadata', r, { once: true }));
    await video.play();
  } catch (e) {
    loadingScreen.style.display = 'none';
    startScreen.style.display = 'flex';
    showError('Camera access was denied. Please allow camera permission and try again.');
    return;
  }

  // 2. Load model
  setLoading('Loading AI model...', 'First visit downloads ~25 MB — cached after that');
  progressWrap.style.display = 'block';
  setPill('Loading...', 'loading-pill');

  try {
    detector = await pipeline('object-detection', 'Xenova/yolov8n', {
      progress_callback: (p) => {
        if (p.status === 'downloading' || p.status === 'progress') {
          const pct = p.progress ? Math.round(p.progress) : 0;
          progressBar.style.width = pct + '%';
          loadingSub.textContent = p.file
            ? `Downloading ${p.file.split('/').pop()} — ${pct}%`
            : `Loading... ${pct}%`;
        }
        if (p.status === 'initiate') {
          setLoading('Preparing model...', `Loading ${p.file ? p.file.split('/').pop() : 'files'}...`);
        }
        if (p.status === 'done') {
          progressBar.style.width = '100%';
        }
      }
    });
  } catch (e) {
    loadingScreen.style.display = 'none';
    startScreen.style.display = 'flex';
    setPill('Error', 'error-pill');
    showError('Failed to load AI model. Check your internet connection and try again. Error: ' + e.message);
    console.error(e);
    return;
  }

  // 3. Go!
  loadingScreen.style.display = 'none';
  statsBar.style.display = 'block';
  setPill('Running', 'running');
  isRunning = true;
  detectLoop();
});

btnReset.addEventListener('click', () => {
  peakCount = 0;
  countPeak.textContent = '0';
});

// ── Detection loop ──
let lastDetect = 0;
const DETECT_INTERVAL = 200; // ms between inferences (~5 fps) — adjust lower for faster but heavier

async function detectLoop() {
  if (!isRunning) return;

  const now = performance.now();
  if (now - lastDetect > DETECT_INTERVAL && video.readyState >= 2) {
    lastDetect = now;
    try {
      // Capture frame
      const offscreen = new OffscreenCanvas(video.videoWidth, video.videoHeight);
      const offCtx = offscreen.getContext('2d');
      offCtx.drawImage(video, 0, 0);
      const blob = await offscreen.convertToBlob({ type: 'image/jpeg', quality: 0.8 });
      const img = await RawImage.fromBlob(blob);

      // Run detection
      const results = await detector(img, { threshold: 0.45 });

      // Filter people only (label === 'person')
      const people = results.filter(r => r.label === 'person');

      drawBoxes(people, video.videoWidth, video.videoHeight);

      const count = people.length;
      countNow.textContent = count;
      if (count > peakCount) {
        peakCount = count;
        countPeak.textContent = peakCount;
      }
    } catch (e) {
      console.warn('Detection error:', e);
    }
  }

  animId = requestAnimationFrame(detectLoop);
}

// ── Draw bounding boxes ──
function drawBoxes(detections, vidW, vidH) {
  const rect = video.getBoundingClientRect();
  canvas.width  = rect.width;
  canvas.height = rect.height;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const sx = rect.width  / vidW;
  const sy = rect.height / vidH;

  for (const det of detections) {
    const { xmin, ymin, xmax, ymax } = det.box;
    const x = xmin * sx, y = ymin * sy;
    const w = (xmax - xmin) * sx, h = (ymax - ymin) * sy;

    // Box outline
    ctx.strokeStyle = '#34d399';
    ctx.lineWidth = 2;
    ctx.strokeRect(x, y, w, h);

    // Corner accents
    const cs = Math.min(w, h) * 0.18;
    ctx.lineWidth = 3;
    ctx.strokeStyle = '#34d399';
    // top-left
    ctx.beginPath(); ctx.moveTo(x, y + cs); ctx.lineTo(x, y); ctx.lineTo(x + cs, y); ctx.stroke();
    // top-right
    ctx.beginPath(); ctx.moveTo(x + w - cs, y); ctx.lineTo(x + w, y); ctx.lineTo(x + w, y + cs); ctx.stroke();
    // bottom-left
    ctx.beginPath(); ctx.moveTo(x, y + h - cs); ctx.lineTo(x, y + h); ctx.lineTo(x + cs, y + h); ctx.stroke();
    // bottom-right
    ctx.beginPath(); ctx.moveTo(x + w - cs, y + h); ctx.lineTo(x + w, y + h); ctx.lineTo(x + w, y + h - cs); ctx.stroke();

    // Score label
    const label = `${Math.round(det.score * 100)}%`;
    ctx.font = 'bold 11px -apple-system, sans-serif';
    const tw = ctx.measureText(label).width;
    const ly = y > 20 ? y - 6 : y + h + 16;
    ctx.fillStyle = '#34d399';
    ctx.fillRect(x - 1, ly - 13, tw + 8, 16);
    ctx.fillStyle = '#000';
    ctx.fillText(label, x + 3, ly);
  }
}
</script>
</body>
</html>
